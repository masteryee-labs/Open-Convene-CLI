name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          LDFLAGS="-X github.com/masteryee-labs/open-convene-cli/internal/version.Version=${VERSION}"

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o openconvene-linux-amd64 ./cmd/openconvene
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o openconvene-linux-arm64 ./cmd/openconvene
          # macOS amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o openconvene-darwin-amd64 ./cmd/openconvene
          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o openconvene-darwin-arm64 ./cmd/openconvene
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o openconvene-windows-amd64.exe ./cmd/openconvene
          # Windows arm64
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o openconvene-windows-arm64.exe ./cmd/openconvene

      - name: Create checksums
        run: sha256sum openconvene-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            openconvene-linux-amd64
            openconvene-linux-arm64
            openconvene-darwin-amd64
            openconvene-darwin-arm64
            openconvene-windows-amd64.exe
            openconvene-windows-arm64.exe
            checksums.txt
